name: CI - API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  ci:
    name: Lint, Build, Test e SonarCloud
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: anatoquizup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d anatoquizup_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/anatoquizup_test?schema=public
      JWT_SECRET: ci-test-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Rodar ESLint
        run: npm run lint

      - name: Gerar Prisma Client
        run: npm run prisma:generate

      - name: Build do projeto
        run: |
          if [ "$(npm pkg get scripts.build)" != "{}" ]; then
            npm run build
          else
            echo "Sem script de build configurado. Pulando."
          fi

      - name: Rodar testes com cobertura
        run: |
          if [ "$(npm pkg get scripts.test)" != "{}" ]; then
            npm test -- --coverage --passWithNoTests
          else
            echo "Sem script de teste configurado. Pulando."
          fi

      - name: Verificar cobertura mínima (85%)
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "::warning::coverage-summary.json não encontrado. Verifique se 'json-summary' está em coverageReporters do Jest."
            exit 0
          fi
          COVERAGE=$(node -p "Math.round(require('./coverage/coverage-summary.json').total.lines.pct)")
          echo "Cobertura de linhas: $COVERAGE%"
          if [ "$COVERAGE" -lt 85 ]; then
            echo "::error::Cobertura ($COVERAGE%) abaixo do mínimo de 85%."
            exit 1
          fi
          echo "::notice::Cobertura ok: $COVERAGE%"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Aguardar SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Exportar metrics.json
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.base_ref == 'main'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT_KEY: fga-eps-mds_2026-1-AnatoQuizUp-Back
        run: |
          # ── Montar nome do arquivo conforme padrão exigido ──────────
          SEMESTER="2026_1"
          PROJECT_NAME="AnatoQuizUp"
          REPO_NAME="Back"
          DATE_HORA=$(date -u +"%m-%d-%Y-%H-%M-%S")
          # Versão: tenta extrair do package.json; senão usa v0.1.0
          VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "0.1.0")
          VERSAO_RELEASE="v${VERSION}"
          FILENAME="fga-eps-mds-${SEMESTER}_UNB-${PROJECT_NAME}-${REPO_NAME}-${DATE_HORA}-${VERSAO_RELEASE}.json"

          # ── Buscar métricas no SonarCloud ───────────────────────────
          METRIC_LIST="files,functions,complexity,comment_lines_density,duplicated_lines_density,coverage,ncloc,tests,test_errors,test_failures,test_execution_time,security_rating"
          curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/measures/component?component=${PROJECT_KEY}&metricKeys=${METRIC_LIST}" \
            -o raw.json

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{\"timestamp\":\"$TIMESTAMP\",\"commit\":\"${{ github.sha }}\",\"filename\":\"$FILENAME\",\"data\":$(cat raw.json)}" > "$FILENAME"
          echo "METRICS_FILE=$FILENAME" >> $GITHUB_ENV
          cat "$FILENAME"

      - name: Upload metrics.json (artefato)
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.base_ref == 'main'
        uses: actions/upload-artifact@v4
        with:
          name: metrics-back-${{ github.sha }}
          path: ${{ env.METRICS_FILE }}
          retention-days: 90

      - name: Publicar metrics.json em analytics-raw-data no repo de Doc
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.base_ref == 'main'
        env:
          DOC_PUSH_TOKEN: ${{ secrets.DOC_PUSH_TOKEN }}
        run: |
          if [ -z "$DOC_PUSH_TOKEN" ]; then
            echo "::warning::Secret DOC_PUSH_TOKEN não configurada — pulando commit no repo de doc."
            exit 0
          fi
          git clone --depth 1 https://x-access-token:$DOC_PUSH_TOKEN@github.com/fga-eps-mds/2026-1-AnatoQuizUp-Doc.git doc-repo
          cd doc-repo
          mkdir -p analytics-raw-data/backend
          cp "../${{ env.METRICS_FILE }}" "analytics-raw-data/backend/${{ env.METRICS_FILE }}"
          # mantém também um "latest" para consulta rápida
          cp "../${{ env.METRICS_FILE }}" analytics-raw-data/backend/latest.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add analytics-raw-data/
          git commit -m "chore(metrics): atualiza métricas backend ${{ env.METRICS_FILE }} [skip ci]" || echo "Sem mudanças para commitar."
          git push
