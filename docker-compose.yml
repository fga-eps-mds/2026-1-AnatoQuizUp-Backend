services:
  db:
    image: postgres:18-alpine
    container_name: anatoquizup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  minio:
      image: minio/minio
      container_name: anatoquizup-minio
      ports:
        - "${MINIO_API_PORT:-9000}:9000"
        - "${MINIO_CONSOLE_PORT:-9001}:9001"
      environment:
        - MINIO_ROOT_USER=${MINIO_ROOT_USER}
        - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      command: server /data --console-address ":9001"
      volumes:
        - minio_data:/var/lib/mino

  minio-setup:  
    image: minio/mc
    container_name: anatoquizup-minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set meu_minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb meu_minio/anatoquizup-imagens --ignore-existing;
      /usr/bin/mc anonymous set public meu_minio/anatoquizup-imagens;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
